databaseChangeLog:
  - changeSet:
      id: 002-create-roles-table
      author: mustafa
      comment: "Create roles table for RBAC"
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: VARCHAR(255)
        - insert:
            tableName: roles
            columns:
              - column:
                  name: id
                  valueComputed: gen_random_uuid()
              - column:
                  name: name
                  value: ROLE_ADMIN
              - column:
                  name: description
                  value: "Full system access"
        - insert:
            tableName: roles
            columns:
              - column:
                  name: id
                  valueComputed: gen_random_uuid()
              - column:
                  name: name
                  value: ROLE_USER
              - column:
                  name: description
                  value: "Standard user access"
        - insert:
            tableName: roles
            columns:
              - column:
                  name: id
                  valueComputed: gen_random_uuid()
              - column:
                  name: name
                  value: ROLE_AUDITOR
              - column:
                  name: description
                  value: "Read-only auditor access"
      rollback:
        - dropTable:
            tableName: roles